      <span class="os-research-head">Research Snapshot</span>
      <span class="os-research-main">My research asks a simple question: <strong>can machines learn strong representations by predicting the world rather than labeling it?</strong></span>
      <span class="os-research-sub">I study multimodal transformers and large language models that integrate perception, motion, and language. By training models to infer missing structure across time and modalities, I develop predictive pretraining methods that yield transferable representations for action recognition, egocentric vision, and world modelling.</span>
